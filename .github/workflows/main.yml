name: OCR Job

on: [push]

jobs:
  ocr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-v1
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Cache PaddleOCR models
        uses: actions/cache@v4
        with:
          path: ~/.paddleocr
          key: paddleocr-${{ runner.os }}-v1
          restore-keys: |
            paddleocr-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install paddleocr==2.7.0.3 paddlepaddle==2.6.0

      - name: Run OCR
        run: |
          python ocr_script.py txn.jpeg

      - name: Upload OCR result
        uses: actions/upload-artifact@v4
        with:
          name: ocr-result
          path: output.txt
