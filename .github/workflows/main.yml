name: OCR Job

on:
  push:

jobs:
  ocr:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ✅ Cache pip dependencies
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-v1
          restore-keys: |
            pip-${{ runner.os }}-

      # ✅ Cache PaddleOCR models
      - name: Cache PaddleOCR models
        uses: actions/cache@v4
        with:
          path: ~/.paddleocr
          key: paddleocr-${{ runner.os }}-v3   # 🔥 bumped version
          restore-keys: |
            paddleocr-${{ runner.os }}-

      # ✅ Install dependencies (stable combo)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install paddleocr==2.7.0.3 paddlepaddle==2.6.2

      # ✅ Run OCR (change filename if needed)
      - name: Run OCR
        run: |
          python ocr_script.py txn.jpeg

      # ✅ Upload result
      - name: Upload OCR result
        uses: actions/upload-artifact@v4
        with:
          name: ocr-result
          path: output.txt
