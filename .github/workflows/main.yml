name: OCR Job (GHCR Fast)

on:
  push:

jobs:
  ocr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # 🔥 required for GHCR

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🔐 Login to GitHub Container Registry
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # ⚡ Try pull existing image (skip rebuild if exists)
      - name: Pull image (if exists)
        run: |
          docker pull ghcr.io/${{ github.repository }}/ocr-app:latest || true

      # 🏗️ Build image (uses cache if pulled)
      - name: Build Docker image
        run: |
          docker build \
            --cache-from ghcr.io/${{ github.repository }}/ocr-app:latest \
            -t ghcr.io/${{ github.repository }}/ocr-app:latest .

      # 🚀 Push updated image
      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}/ocr-app:latest

      # ⚡ Run OCR (FAST)
      - name: Run OCR
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            ghcr.io/${{ github.repository }}/ocr-app:latest \
            python ocr_script.py sample.png

      # 📤 Upload result
      - name: Upload OCR result
        uses: actions/upload-artifact@v4
        with:
          name: ocr-result
          path: output.txt